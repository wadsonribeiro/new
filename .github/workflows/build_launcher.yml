name: Build Launcher EXE

on:
  workflow_dispatch:

jobs:
  build-launcher:
    runs-on: windows-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar PyInstaller
        run: pip install pyinstaller

      - name: Compilar My Android.exe com ícone
        run: |
          pyinstaller --onefile --noconsole --name "My Android" --icon "launcher/icone.ico" launcher/scrcpy_launcher.py

      - name: Upload My Android.exe
        uses: actions/upload-artifact@v4
        with:
          name: MyAndroid-exe
          path: "dist/My Android.exe"
          retention-days: 30
